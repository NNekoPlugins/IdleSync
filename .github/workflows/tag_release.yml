name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  Release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0
          fetch-tags: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
          GitVersion: ${{ github.ref_name }}

      - name: Setup Dalamud
        uses: Blooym/setup-dalamud@v1.1.0

      - name: Restore Dependencies
        run: dotnet restore NNekoTemplate/NNekoTemplate.csproj


      - name: Build plugin in release mode
        run: dotnet build NNekoTemplate/NNekoTemplate.csproj -c Release --no-restore --nologo -o NNekoTemplate/bin/Release

      - name: Generate Checksums
        working-directory: NNekoTemplate/bin/Release/NNekoTemplate
        run: |
          sha512sum latest.zip >> checksums.sha512

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NNekoTemplate/bin/Release/NNekoTemplate/latest.zip
            NNekoTemplate/bin/Release/NNekoTemplate/checksums.sha512
          prerelease: false
          append_body: true
          body_path: .github/release-notices.md
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Update repo.json
        run: |

          export TAG_NAME=$(echo ${{ github.ref_name }} | sed 's/^v//')
          export REPO_LOCATION=$(echo ${{ github.server_url }}/${{ github.repository }} | sed  's/\//\\\//g')
          
          sed -i "s/\"AssemblyVersion\": \"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*\"/\"AssemblyVersion\": \"${TAG_NAME}\"/g" repo.json
          sed -i "s/\"Version\": \"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*\"/\"Version\": \"${TAG_NAME}\"/g" repo.json
          sed -i "s/\"TestingAssemblyVersion\": \"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*\"/\"TestingAssemblyVersion\": \"${TAG_NAME}\"/g" repo.json
          sed -i "s/\"DownloadLinkInstall\": \"[^\"]*\"/\"DownloadLinkInstall\": \"$REPO_LOCATION\/releases\/download\/${{ github.ref_name }}\/latest.zip\"/g" repo.json
          sed -i "s/\"DownloadLinkTesting\": \"[^\"]*\"/\"DownloadLinkTesting\": \"$REPO_LOCATION\/releases\/download\/${{ github.ref_name }}\/latest.zip\"/g" repo.json
          sed -i "s/\"DownloadLinkUpdate\": \"[^\"]*\"/\"DownloadLinkUpdate\": \"$REPO_LOCATION\/releases\/download\/${{ github.ref_name }}\/latest.zip\"/g" repo.json

          git add repo.json

          export PROJECT_LOCATION=$(echo ${{ github.server_url }}/${{ github.repository }} | sed  's/\//\\\//g')
          sed -i "s/\"AssemblyVersion\": \"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*\"/\"AssemblyVersion\": \"${TAG_NAME}\"/g" NNekoTemplate/NNekoTemplate.json
          sed -i "s/\"Version\": \"[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*\"/\"Version\": \"${TAG_NAME}\"/g" NNekoTemplate/NNekoTemplate.json

          git add NNekoTemplate/NNekoTemplate.json
          
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update repo.json for ${{ github.ref_name }}"
          
          git push origin HEAD:main